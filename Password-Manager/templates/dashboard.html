<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="box">

        <h1>🔑 Password Manager</h1>

        <form method="POST">

            <input type="text"
                   name="site"
                   placeholder="Website"
                   required>

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Add
            </button>

        </form>

        <a href="/logout" class="logout">
            Logout
        </a>

        <hr>

        <a href="/saved-passwords">

            <button class="saved-btn">
                Saved Passwords
            </button>

        </a>

    </div>

</body>

</html>
